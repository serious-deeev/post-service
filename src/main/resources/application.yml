grpc:
  server:
    port: ${POST_SERVICE_GRPC_PORT}

spring:
  application:
    name: post-service
  profiles:
    active: ${POST_SERVICE_PROFILE}

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      driver-class-name: "org.postgresql.Driver"

  jpa:
    generate-ddl: false
    properties:
      hibernate:
        default_schema: "user_post_storage"

  kafka:
    topics:
      order-topic: "order-topic"
    consumer:
      bootstrap-servers: ${KAFKA_BROKER_HOST}:${KAFKA_BROKER_PORT}
      group-id: "post-service-consumer-group"
      key-deserializer: "org.apache.kafka.common.serialization.StringDeserializer"
      value-deserializer: "org.apache.kafka.common.serialization.StringDeserializer"
      auto-offset-reset: earliest
      enable-auto-commit: false
    event-filter:
      header-key: "__TypeId__"
      expected-value: "orderFailed"
