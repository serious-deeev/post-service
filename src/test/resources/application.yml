grpc:
  server:
    url: ${POST_SERVICE_GRPC_URL:localhost}
    port: ${POST_SERVICE_GRPC_PORT:18002}

spring:
  datasource:
    url: jdbc:tc:postgresql:16.8:///user_post_repository
  liquibase:
    change-log: classpath:db/changelog/changelog-master.xml
    enabled: true
  jpa:
    generate-ddl: false
    properties:
      hibernate:
        default_schema: "user_post_storage"
        format_sql: true
    show-sql: true

  kafka:
    topics:
      order-topic: "order-topic"
    consumer:
      bootstrap-servers: ${KAFKA_BROKER_HOST:localhost}:${KAFKA_BROKER_PORT:9092}
      group-id: "post-service-consumer-group"
      key-deserializer: "org.apache.kafka.common.serialization.StringDeserializer"
      value-deserializer: "org.apache.kafka.common.serialization.StringDeserializer"
      auto-offset-reset: earliest
      enable-auto-commit: false
    event-filter:
      header-key: "__TypeId__"
      expected-value: "orderFailed"

logging:
  level:
    org:
      springframework:
        transaction:
          interceptor: trace
        orm:
          jpa:
            JpaTransactionManager: debug
      hibernate:
        engine:
          transaction:
            internal:
              TransactionImpl: debug
      assertj:
        core: debug
